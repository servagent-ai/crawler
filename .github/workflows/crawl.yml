name: Crawl Skills

on:
  schedule:
    # Run every Sunday at 02:00 UTC
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      max_repos:
        description: "Max GitHub repos to crawl"
        required: false
        default: "5000"
      min_stars:
        description: "Minimum stars for GitHub repos"
        required: false
        default: "10"
      skip_github:
        description: "Skip GitHub crawl (true/false)"
        required: false
        default: "false"
      skip_external:
        description: "Skip external sources crawl (true/false)"
        required: false
        default: "false"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ------------------------------------------------------------------
      # Step 1: Crawl GitHub (existing behavior)
      # ------------------------------------------------------------------
      - name: Crawl GitHub repos
        if: ${{ github.event.inputs.skip_github != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/skill_crawler.py crawl \
            --output scripts/crawler/skills-raw-github.json \
            --min-stars ${{ github.event.inputs.min_stars || '10' }} \
            --max-repos ${{ github.event.inputs.max_repos || '5000' }}

      - name: Create empty GitHub raw file if skipped
        if: ${{ github.event.inputs.skip_github == 'true' }}
        run: |
          mkdir -p scripts/crawler
          echo "[]" > scripts/crawler/skills-raw-github.json

      # ------------------------------------------------------------------
      # Step 2: Crawl external sources (LobeHub, MCP Official, npm, Smithery)
      # ------------------------------------------------------------------
      - name: Crawl external sources
        if: ${{ github.event.inputs.skip_external != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/skill_crawler.py crawl-external \
            --output scripts/crawler/skills-raw-external.json

      - name: Create empty external raw file if skipped
        if: ${{ github.event.inputs.skip_external == 'true' }}
        run: |
          mkdir -p scripts/crawler
          echo "[]" > scripts/crawler/skills-raw-external.json

      # ------------------------------------------------------------------
      # Step 3: Merge GitHub + external results into one file
      # ------------------------------------------------------------------
      - name: Merge GitHub and external results
        run: |
          python3 - <<'PYEOF'
          import json, os

          github_file  = "scripts/crawler/skills-raw-github.json"
          external_file = "scripts/crawler/skills-raw-external.json"
          merged_file  = "scripts/crawler/skills-raw.json"

          os.makedirs("scripts/crawler", exist_ok=True)

          github_skills = []
          if os.path.exists(github_file):
              with open(github_file) as f:
                  github_skills = json.load(f)

          external_skills = []
          if os.path.exists(external_file):
              with open(external_file) as f:
                  external_skills = json.load(f)

          # Merge, dedup by id (GitHub wins on collision since it comes first)
          seen_ids = set()
          merged = []
          for skill in github_skills + external_skills:
              if skill.get("id") and skill["id"] not in seen_ids:
                  seen_ids.add(skill["id"])
                  merged.append(skill)

          with open(merged_file, "w") as f:
              json.dump(merged, f, indent=2, ensure_ascii=False)

          print(f"Merged: {len(github_skills)} GitHub + {len(external_skills)} external = {len(merged)} unique skills")
          PYEOF

      # ------------------------------------------------------------------
      # Step 4: Score merged results
      # ------------------------------------------------------------------
      - name: Score skills
        run: |
          python scripts/skill_crawler.py score \
            --input  scripts/crawler/skills-raw.json \
            --output scripts/crawler/skills-scored.json

      # ------------------------------------------------------------------
      # Step 5: Deduplicate
      # ------------------------------------------------------------------
      - name: Deduplicate skills
        run: |
          python scripts/skill_crawler.py dedup \
            --input  scripts/crawler/skills-scored.json \
            --output scripts/crawler/skills-deduped.json

      # ------------------------------------------------------------------
      # Step 6: Upload to ServAgent API
      # ------------------------------------------------------------------
      - name: Upload to ServAgent API
        env:
          SERVAGENT_API_KEY: ${{ secrets.SERVAGENT_API_KEY }}
        run: |
          python scripts/skill_crawler.py upload \
            --input   scripts/crawler/skills-deduped.json \
            --api-url https://api.servagent.ai \
            --api-key "$SERVAGENT_API_KEY"

      # ------------------------------------------------------------------
      # Step 7: Commit updated skill files back to repo (optional artifact)
      # ------------------------------------------------------------------
      - name: Commit crawler output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/crawler/skills-raw.json \
                  scripts/crawler/skills-raw-github.json \
                  scripts/crawler/skills-raw-external.json \
                  scripts/crawler/skills-scored.json \
                  scripts/crawler/skills-deduped.json || true
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update crawled skills [$(date -u +%Y-%m-%d)]"
          git push || echo "Push failed (may need write permissions)"

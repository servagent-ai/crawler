name: Crawl → PR to skills-data

on:
  schedule:
    - cron: "0 14 * * 4"   # Thursday 22:00 CST
  workflow_dispatch:
    inputs:
      max_repos:
        description: "Max repos to crawl"
        default: "5000"
      min_stars:
        description: "Min stars filter"
        default: "10"

jobs:
  crawl:
    name: Crawl & Score
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Crawl GitHub
        run: |
          python scripts/skill_crawler.py crawl \
            --output /tmp/skills-raw.json \
            --min-stars ${{ github.event.inputs.min_stars || '10' }} \
            --max-repos ${{ github.event.inputs.max_repos || '5000' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Score & filter
        run: |
          python scripts/skill_crawler.py score \
            --input  /tmp/skills-raw.json \
            --output /tmp/skills-scored.json

      - name: Deduplicate
        run: |
          python scripts/skill_crawler.py dedup \
            --input  /tmp/skills-scored.json \
            --output /tmp/skills-deduped.json

      - name: Print summary
        id: summary
        run: |
          RAW=$(python3 -c "import json; print(len(json.load(open('/tmp/skills-raw.json'))))")
          SCORED=$(python3 -c "import json; print(len(json.load(open('/tmp/skills-scored.json'))))")
          DEDUPED=$(python3 -c "import json; print(len(json.load(open('/tmp/skills-deduped.json'))))")
          echo "raw=$RAW" >> $GITHUB_OUTPUT
          echo "scored=$SCORED" >> $GITHUB_OUTPUT
          echo "deduped=$DEDUPED" >> $GITHUB_OUTPUT
          echo "## Crawler Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Crawled (raw) | $RAW |" >> $GITHUB_STEP_SUMMARY
          echo "| After scoring (≥45) | $SCORED |" >> $GITHUB_STEP_SUMMARY
          echo "| After dedup | $DEDUPED |" >> $GITHUB_STEP_SUMMARY

      - name: Open PR to skills-data
        run: |
          # Clone skills-data
          git clone https://x-access-token:${{ secrets.SKILLS_DATA_TOKEN }}@github.com/servagent-ai/skills-data.git /tmp/skills-data-repo

          # Copy new data
          cp /tmp/skills-deduped.json /tmp/skills-data-repo/data/skills-latest.json

          # Merge latest into main skills.json (union by id, keep highest quality_score)
          python3 - <<'EOF'
          import json
          from pathlib import Path

          existing = json.load(open('/tmp/skills-data-repo/data/skills.json'))
          latest   = json.load(open('/tmp/skills-deduped.json'))

          by_id = {s['id']: s for s in existing}
          added = 0
          for skill in latest:
              sid = skill['id']
              if sid not in by_id or skill.get('quality_score', 0) > by_id[sid].get('quality_score', 0):
                  if sid not in by_id:
                      added += 1
                  by_id[sid] = skill

          merged = sorted(by_id.values(), key=lambda s: s.get('quality_score', 0), reverse=True)
          json.dump(merged, open('/tmp/skills-data-repo/data/skills.json', 'w'), ensure_ascii=False, indent=2)
          print(f"Merged: {len(existing)} existing + {added} new = {len(merged)} total")
          EOF

          # Commit and push branch
          cd /tmp/skills-data-repo
          git config user.name "servagent-crawler[bot]"
          git config user.email "crawler@servagent.ai"
          BRANCH="crawler/$(date +%Y-%m-%d)"
          git checkout -b $BRANCH
          git add data/
          git diff --cached --stat
          git commit -m "crawler: weekly update $(date +%Y-%m-%d) — ${{ steps.summary.outputs.deduped }} skills"
          git push origin $BRANCH

          # Open PR via gh
          gh pr create \
            --repo servagent-ai/skills-data \
            --head $BRANCH \
            --base main \
            --title "crawler: weekly update $(date +%Y-%m-%d)" \
            --body "## Weekly Crawler Update

          | Stage | Count |
          |-------|-------|
          | Crawled (raw) | ${{ steps.summary.outputs.raw }} |
          | After scoring | ${{ steps.summary.outputs.scored }} |
          | After dedup | ${{ steps.summary.outputs.deduped }} |

          Merge this PR to deploy updated skills to production.

          🤖 Auto-generated by [crawler workflow](https://github.com/servagent-ai/crawler/actions)"
        env:
          GH_TOKEN: ${{ secrets.SKILLS_DATA_TOKEN }}
